<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Encontro dos Amigos</title>

  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      text-align: center;
      padding: 20px;
    }

    .container {
      background: white;
      max-width: 600px;
      margin: auto;
      padding: 20px;
      border-radius: 10px;
    }

    select, input, button {
      padding: 10px;
      width: 90%;
      margin-top: 10px;
    }

    .date {
      padding: 10px;
      margin: 5px;
      border: 1px solid #ddd;
      display: inline-block;
      width: 80px;
      cursor: pointer;
    }

    .reserved {
      background: #ffdddd;
      cursor: not-allowed;
    }

    .selected {
      background: #c8f7c5;
    }

    button {
      background: #007bff;
      color: white;
      border: none;
      border-radius: 5px;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>🍻 Encontro dos Amigos</h1>

  <select id="monthSelect" onchange="load()">
    <option value="0">Janeiro</option>
    <option value="1">Fevereiro</option>
    <option value="2">Março</option>
    <option value="3">Abril</option>
    <option value="4">Maio</option>
    <option value="5">Junho</option>
    <option value="6" selected>Julho</option>
    <option value="7">Agosto</option>
    <option value="8">Setembro</option>
    <option value="9">Outubro</option>
    <option value="10">Novembro</option>
    <option value="11">Dezembro</option>
  </select>

  <div id="dates"></div>

  <input id="name" placeholder="Seu nome"/>
  <button onclick="reserve()">Reservar</button>
</div>

<script>
let selected = null;

function key(month, day) {
  return `${month}-${day}`;
}

function getData() {
  return JSON.parse(localStorage.getItem("reservas") || "{}");
}

function saveData(data) {
  localStorage.setItem("reservas", JSON.stringify(data));
}

function generateMonth(month) {
  const year = new Date().getFullYear();
  const days = new Date(year, month + 1, 0).getDate();

  let list = [];
  for (let i = 1; i <= days; i++) {
    list.push(i);
  }
  return list;
}

function load() {
  const month = document.getElementById("monthSelect").value;
  const container = document.getElementById("dates");
  container.innerHTML = "";

  const data = getData();
  const days = generateMonth(month);

  days.forEach(day => {
    const k = key(month, day);
    const div = document.createElement("div");
    div.className = "date";

    if (data[k]) {
      div.classList.add("reserved");
      div.innerText = `${day} - ${data[k]}`;
    } else {
      div.innerText = day;

      div.onclick = () => {
        selected = k;

        document.querySelectorAll(".date").forEach(d => d.classList.remove("selected"));
        div.classList.add("selected");
      };
    }

    container.appendChild(div);
  });
}

function reserve() {
  const name = document.getElementById("name").value;

  if (!selected) {
    alert("Escolha uma data!");
    return;
  }

  if (!name) {
    alert("Digite seu nome!");
    return;
  }

  const data = getData();
  data[selected] = name;
  saveData(data);

  alert("Reserva feita com sucesso!");
  selected = null;
  load();
}

load();
</script>

</body>
</html>

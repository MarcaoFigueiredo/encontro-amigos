<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Encontro dos Amigos</title>

  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      text-align: center;
      padding: 20px;
    }

    .container {
      background: white;
      max-width: 600px;
      margin: auto;
      padding: 20px;
      border-radius: 10px;
    }

    select, input, button {
      padding: 10px;
      width: 90%;
      margin-top: 10px;
    }

    .date {
      padding: 10px;
      margin: 5px;
      border: 1px solid #ddd;
      display: inline-block;
      width: 80px;
      cursor: pointer;
      border-radius: 5px;
      user-select: none;
    }

    .selected {
      background: #c8f7c5;
    }

    button {
      background: #007bff;
      color: white;
      border: none;
      border-radius: 5px;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>🍻 Encontro dos Amigos</h1>

  <select id="monthSelect" onchange="load()">
    <option value="0">Janeiro</option>
    <option value="1">Fevereiro</option>
    <option value="2">Março</option>
    <option value="3">Abril</option>
    <option value="4">Maio</option>
    <option value="5">Junho</option>
    <option value="6" selected>Julho</option>
    <option value="7">Agosto</option>
    <option value="8">Setembro</option>
    <option value="9">Outubro</option>
    <option value="10">Novembro</option>
    <option value="11">Dezembro</option>
  </select>

  <div id="dates"></div>

  <input id="firstName" placeholder="Nome"/>
  <input id="lastName" placeholder="Sobrenome"/>

 <button onclick="cancelReserve()" style="background:#dc3545;">
    Cancelar Reserva
</button>

<script>
let selected = null;

function key(month, day) {
  return `${month}-${day}`;
}

function getData() {
  return JSON.parse(localStorage.getItem("reservas") || "{}");
}

function saveData(data) {
  localStorage.setItem("reservas", JSON.stringify(data));
}

function generateMonth(month) {
  const year = new Date().getFullYear();
  const days = new Date(year, Number(month) + 1, 0).getDate();

  let list = [];
  for (let i = 1; i <= days; i++) {
    list.push(i);
  }
  return list;
}

function load() {
  const month = document.getElementById("monthSelect").value;
  const container = document.getElementById("dates");
  container.innerHTML = "";

  const data = getData();
  const days = generateMonth(month);

  days.forEach(day => {

    const k = key(month, day);
    const div = document.createElement("div");
    div.className = "date";

    if (data[k]) {

      div.innerText = `${day} - Reservado`;

      // Aparência de bloqueado
      div.style.opacity = "0.4";
      div.style.background = "#f2f2f2";
      div.style.cursor = "not-allowed";

      // Exibe quem reservou ao passar o mouse
      div.title = `Reservado por: ${data[k]}`;

      // Não permite selecionar a data
      div.onclick = function () {
        return;
      };

    } else {

      div.innerText = day;

      div.onclick = function () {

        selected = k;

        document.querySelectorAll(".date").forEach(function(d){
          d.classList.remove("selected");
        });

        div.classList.add("selected");
      };

    }

    container.appendChild(div);

  });

}

function cancelReserve() {

  const month = document.getElementById("monthSelect").value;
  const day = prompt("Digite o número do dia que deseja liberar:");

  if (!day) return;

  const k = key(month, day);

  const data = getData();

  if (!data[k]) {
    alert("Esta data não está reservada.");
    return;
  }

  if (confirm(`Cancelar a reserva de ${data[k]}?`)) {
    delete data[k];
    saveData(data);
    load();
    alert("Reserva cancelada com sucesso!");
  }

}

function clearOldReservations() {

  const currentMonth = new Date().getMonth();
  const data = getData();

  Object.keys(data).forEach(key => {
    const month = parseInt(key.split("-")[0]);

    if (month !== currentMonth) {
      delete data[key];
    }
  });

  saveData(data);

}
  
clearOldReservations();
load();
</script>

</body>
</html>

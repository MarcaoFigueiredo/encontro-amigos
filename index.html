<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Encontro dos Amigos</title>

  <style>
    body { font-family: Arial; background:#f5f5f5; text-align:center; padding:20px; }
    .box { background:white; max-width:500px; margin:auto; padding:20px; border-radius:10px; }
    .date { padding:10px; margin:8px; border:1px solid #ddd; cursor:pointer; }
    .selected { background:#c8f7c5; }
    .reserved { background:#ffdddd; cursor:not-allowed; }
    button { padding:10px; width:90%; margin-top:10px; }
  </style>
</head>

<body>

<div class="box">
  <h1>🍻 Encontro dos Amigos</h1>

  <div id="dates"></div>

  <input id="name" placeholder="Seu nome" />
  <button onclick="reserve()">Reservar</button>
</div>

<script>
const dates = ["05/07","12/07","19/07","26/07"];
let selected = null;

function load() {
  const container = document.getElementById("dates");
  container.innerHTML = "";

  dates.forEach(d => {
    const el = document.createElement("div");
    el.className = "date";
    el.innerText = d + " - Livre";

    el.onclick = () => {
      selected = d;
      document.querySelectorAll(".date").forEach(x => x.classList.remove("selected"));
      el.classList.add("selected");
    };

    container.appendChild(el);
  });
}

function reserve() {
  const name = document.getElementById("name").value;

  if (!selected) {
    alert("Escolha uma data!");
    return;
  }

  if (!name) {
    alert("Digite seu nome!");
    return;
  }

  alert("Reserva feita: " + selected + " por " + name);

  selected = null;
  document.getElementById("name").value = "";
  load();
}

load();
</script>

</body>
</html>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
  import {
    getFirestore,
    collection,
    doc,
    getDocs,
    setDoc
  } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCo-xs9qyIfSQ3Q_MsuHnBsh1egMVMrzKY",
    authDomain: "encontro-dos-amigos-466a2.firebaseapp.com",
    projectId: "encontro-dos-amigos-466a2",
    storageBucket: "encontro-dos-amigos-466a2.firebasestorage.app",
    messagingSenderId: "961408725030",
    appId: "1:961408725030:web:31e1f98ab667c8517176e7"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const dates = ["05/07","12/07","19/07","26/07"];

  let selected = "";

  function setSelected(date) {
    selected = date;
    alert("Data selecionada: " + date);
  }

  async function loadDates() {
    const snap = await getDocs(collection(db, "reservas"));
    const reserved = {};

    snap.forEach(d => {
      reserved[d.id] = d.data();
    });

    const container = document.getElementById("dates");
    container.innerHTML = "";

    dates.forEach(date => {
      const div = document.createElement("div");
      div.className = "date";

      if (reserved[date]) {
        div.classList.add("reserved");
        div.innerText = `${date} - Reservado por ${reserved[date].name}`;
      } else {
        div.innerText = `${date} - Livre`;
        div.onclick = () => setSelected(date);
      }

      container.appendChild(div);
    });
  }

  window.reserve = async function () {
    const name = document.getElementById("name").value;

    if (!selected) {
      alert("Escolha uma data!");
      return;
    }

    if (!name) {
      alert("Digite seu nome!");
      return;
    }

    await setDoc(doc(db, "reservas", selected), {
      name: name
    });

    selected = "";
    loadDates();
  };

  loadDates();
</script>
